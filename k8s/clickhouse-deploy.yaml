---
# --- ClickHouse Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: clickhouse
  name: clickhouse
spec:
  replicas: 1 # Number of ClickHouse server pods
  selector: # How the Deployment finds its pods
    matchLabels:
      app: clickhouse # A common label to identify the application
  template: # This is the Pod template definition
    metadata:
      labels:
        app: clickhouse # Must match spec.selector.matchLabels
        io.kompose.service: clickhouse
    spec:
      # Optional: Add securityContext if you encounter permission issues
      # securityContext:
      #   fsGroup: 1000 # Common UID/GID for non-root users in ClickHouse images
      containers:
        - image: clickhouse/clickhouse-server:24.8.7.41
          name: clickhouse
          ports:
            - containerPort: 8123 # HTTP client port
              protocol: TCP
            - containerPort: 9000 # Native TCP client port
              protocol: TCP
          volumeMounts:
            - mountPath: /idl
              name: clickhouse-idl
            - mountPath: /docker-entrypoint-initdb.d
              name: clickhouse-initdb-d
            - mountPath: /etc/clickhouse-server
              name: clickhouse-server-config
            - mountPath: /etc/clickhouse-server/config.d
              name: clickhouse-server-config-config-d
            - mountPath: /var/lib/clickhouse/user_scripts
              name: clickhouse-user-scripts
            - mountPath: /var/lib/clickhouse
              name: clickhouse-data
      volumes:
        # ConfigMaps (for configuration files and scripts)
        - name: clickhouse-initdb-d
          configMap:
            name: clickhouse-initdb-d
        - name: clickhouse-user-scripts
          configMap:
            name: clickhouse-user-scripts
        - name: clickhouse-idl
          configMap:
            name: clickhouse-idl
        - name: clickhouse-server-config
          configMap:
            name: clickhouse-server-config
        - name: clickhouse-server-config-config-d
          configMap:
            name: clickhouse-server-config-config-d
        # PersistentVolumeClaim (for mutable data)
        - name: clickhouse-data
          persistentVolumeClaim:
            claimName: clickhouse-data
---

# --- ClickHouse Service ---
apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: clickhouse
  name: clickhouse # Name of the Service, used for DNS resolution within the cluster
spec:
  selector:
    app: clickhouse # Selects Pods with the label app: clickhouse
  ports:
    - protocol: TCP
      port: 8123 # Service port for HTTP/external connections
      targetPort: 8123 # Container port
      name: http
    - protocol: TCP
      port: 9000 # Service port for native TCP connections
      targetPort: 9000 # Container port
      name: tcp
  type: ClusterIP # Exposes the service internally within the cluster (can change for external access)
