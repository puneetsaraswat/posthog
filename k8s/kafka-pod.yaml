apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: kafka
  name: kafka
spec:
  containers:
    - env:
        - name: ALLOW_PLAINTEXT_LISTENER
          value: "true"
        - name: KAFKA_BROKER_ID
          value: "1001"
        - name: KAFKA_CFG_ADVERTISED_LISTENERS
          value: PLAINTEXT://kafka:9092
        - name: KAFKA_CFG_LISTENERS
          value: PLAINTEXT://:9092
        - name: KAFKA_CFG_RESERVED_BROKER_MAX_ID
          value: "1001"
        - name: KAFKA_CFG_ZOOKEEPER_CONNECT
          value: zookeeper:2181
        - name: KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS
          value: "300000"
        - name: KAFKA_LOG_RETENTION_HOURS
          value: "1"
        - name: KAFKA_LOG_RETENTION_MS
          value: "3600000"
      image: ghcr.io/posthog/kafka-container:v2.8.2
      livenessProbe:
        exec:
          command:
            - kafka-cluster.sh cluster-id --bootstrap-server localhost:9092 || exit 1
        failureThreshold: 10
        periodSeconds: 3
        timeoutSeconds: 10
      name: kafka
      volumeMounts:
        - mountPath: /bitnami/kafka
          name: kafka-data
  restartPolicy: OnFailure
  volumes:
    - name: kafka-data
      persistentVolumeClaim:
        claimName: kafka-data
