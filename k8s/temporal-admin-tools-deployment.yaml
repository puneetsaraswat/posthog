apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: temporal-admin-tools
  name: temporal-admin-tools
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: temporal-admin-tools
  template:
    metadata:
      annotations:
        kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: temporal-admin-tools
    spec:
      containers:
        - env:
            - name: TEMPORAL_CLI_ADDRESS
              value: temporal:7233
          image: temporalio/admin-tools:1.20.0
          name: temporal-admin-tools
          stdin: true
          tty: true
      restartPolicy: Always
