apiVersion: v1
kind: ConfigMap
metadata:
  name: caddyfile-config
  labels:
    app: caddy-proxy
data:
  Caddyfile: |
    http://:8000 {
        @replay-capture {
            path /s
            path /s/*
        }

        @capture {
            path /e
            path /e/*
            path /i/v0/*
            path /batch
            path /batch*
            path /capture
            path /capture*
        }

        @flags {
            path /flags
            path /flags*
        }

        @webhooks {
            path /public/webhooks
            path /public/webhooks/*
        }

        handle @capture {
            reverse_proxy capture:3000
        }

        handle @replay-capture {
            reverse_proxy replay-capture:3000
        }

        handle @flags {
            reverse_proxy feature-flags:3001
        }

        handle @webhooks {
            reverse_proxy plugins:6738
        }

        handle {
            reverse_proxy web:8000
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-proxy
  labels:
    app: caddy-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: caddy-proxy
  template:
    metadata:
      labels:
        app: caddy-proxy
    spec:
      containers:
        - name: caddy
          image: caddy:latest # Use the latest stable Caddy image
          ports:
            - containerPort: 8000 # Caddy's default HTTP port
              protocol: TCP
            - containerPort: 443 # Caddy's default HTTPS port
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/caddy/Caddyfile # Mount Caddyfile to its default location
              name: caddyfile-volume
              subPath: Caddyfile # Mounts only the 'Caddyfile' key from the ConfigMap
          # If using automatic HTTPS in Caddyfile, you will also need a persistent volume for /data:
          # - mountPath: /data
          #   name: caddy-data-volume
      volumes:
        - name: caddyfile-volume
          configMap:
            name: caddyfile-config # Name of the ConfigMap created above
        # If using automatic HTTPS and need persistent certs:
        # - name: caddy-data-volume
        #   persistentVolumeClaim:
        #     claimName: caddy-data-pvc # Name of your PVC for Caddy data
---
apiVersion: v1
kind: Service
metadata:
  name: caddy-proxy
  labels:
    app: caddy-proxy
spec:
  selector:
    app: caddy-proxy
  ports:
    - name: http
      port: 80 # Service listens on port 80
      targetPort: 8000 # Forwards to container port 80
      protocol: TCP
    - name: https
      port: 443 # Service listens on port 443
      targetPort: 8000 # Forwards to container port 443
      protocol: TCP
  type: ClusterIP # Use ClusterIP for internal access. Change to NodePort or LoadBalancer for external access.

