apiVersion: apps/v1
kind: Deployment
metadata:
  name: replay-capture
  labels:
    app: replay-capture # Essential label for Deployment management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: replay-capture # Matches the label on the Pod template
  template:
    metadata:
      labels:
        app: replay-capture # Essential label for Service selection and Deployment management
    spec:
      containers:
        - name: replay-capture # Container name first
          image: ghcr.io/posthog/posthog/capture:master
          ports:
            - containerPort: 3000 # The port the application listens on
              protocol: TCP
          env:
            - name: ADDRESS
              value: 0.0.0.0:3000
            - name: CAPTURE_MODE
              value: recordings
            - name: KAFKA_HOSTS
              value: kafka:9092
            - name: KAFKA_TOPIC
              value: session_recording_snapshot_item_events
            - name: REDIS_URL
              value: redis://redis:6379/
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 1Gi
      # No volumes defined in your original spec, so none are included here.
---
apiVersion: v1
kind: Service
metadata:
  name: replay-capture
  labels:
    app: replay-capture # Essential label for Service selection
spec:
  selector:
    app: replay-capture # Selects pods with label app: replay-capture
  ports:
    - name: http-replay-capture
      port: 3000 # Service port
      targetPort: 3000 # Container port
      protocol: TCP
  type: ClusterIP # Typically internal access, change to NodePort/LoadBalancer if external access is needed