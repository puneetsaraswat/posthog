apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: asyncmigrationscheck
  name: asyncmigrationscheck
spec:
  containers:
    - args:
        - python
        - manage.py
        - run_async_migrations
        - --check
      env:
        - name: API_QUERIES_PER_TEAM
          value: '{"1": 7}'
        - name: CDP_API_URL
          value: http://plugins:6738
        - name: CLICKHOUSE_API_PASSWORD
          value: apipass
        - name: CLICKHOUSE_API_USER
          value: api
        - name: CLICKHOUSE_APP_PASSWORD
          value: apppass
        - name: CLICKHOUSE_APP_USER
          value: app
        - name: CLICKHOUSE_DATABASE
          value: posthog
        - name: CLICKHOUSE_HOST
          value: clickhouse
        - name: CLICKHOUSE_SECURE
          value: "false"
        - name: CLICKHOUSE_VERIFY
          value: "false"
        - name: DATABASE_URL
          value: postgres://posthog:posthog@db:5432/posthog
        - name: DEPLOYMENT
          value: hobby
        - name: DISABLE_SECURE_SSL_REDIRECT
          value: "true"
        - name: IS_BEHIND_PROXY
          value: "true"
        - name: KAFKA_HOSTS
          value: kafka
        - name: PGHOST
          value: db
        - name: PGPASSWORD
          value: posthog
        - name: PGUSER
          value: posthog
        - name: REDIS_URL
          value: redis://redis:6379/
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: posthog-secrets
              key: SECRET_KEY
        - name: SENTRY_DSN
        - name: SITE_URL
          value: https://
        - name: SKIP_ASYNC_MIGRATIONS_SETUP
          value: "0"
      image: 'posthog/posthog:latest'
      name: asyncmigrationscheck
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 500m
          memory: 1Gi
  restartPolicy: Never
