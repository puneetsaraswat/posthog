apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-django-worker
  labels:
    app: temporal-django-worker # Essential label for Deployment management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-django-worker # Matches the label on the Pod template
  template:
    metadata:
      labels:
        app: temporal-django-worker # Essential label for Deployment management
    spec:
      containers:
        - name: temporal-django-worker # Container name first
          image: 'posthog/posthog:latest'
          args:
            - /compose/temporal-django-worker
          env:
            - name: API_QUERIES_PER_TEAM
              value: '{"1": 7}'
            - name: CDP_API_URL
              value: http://plugins:6738
            - name: CLICKHOUSE_API_PASSWORD
              value: apipass
            - name: CLICKHOUSE_API_USER
              value: api
            - name: CLICKHOUSE_APP_PASSWORD
              value: apppass
            - name: CLICKHOUSE_APP_USER
              value: app
            - name: CLICKHOUSE_DATABASE
              value: posthog
            - name: CLICKHOUSE_HOST
              value: clickhouse
            - name: CLICKHOUSE_SECURE
              value: "false"
            - name: CLICKHOUSE_VERIFY
              value: "false"
            - name: DATABASE_URL
              value: postgres://posthog:posthog@db:5432/posthog
            - name: DEPLOYMENT
              value: hobby
            - name: DISABLE_SECURE_SSL_REDIRECT
              value: "true"
            - name: IS_BEHIND_PROXY
              value: "true"
            - name: KAFKA_HOSTS
              value: kafka
            - name: PGHOST
              value: db
            - name: PGPASSWORD
              value: posthog
            - name: PGUSER
              value: posthog
            - name: REDIS_URL
              value: redis://redis:6379/
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: posthog-secrets # Ensure this Secret exists and has 'SECRET_KEY'
                  key: SECRET_KEY
            - name: SENTRY_DSN # No value provided in original spec
            - name: SITE_URL
              value: https://
            - name: TEMPORAL_HOST
              value: temporal
          resources:
            requests:
              cpu: 500m
              memory: 4Gi
            limits:
              cpu: 500m
              memory: 4Gi
          volumeMounts:
            - mountPath: /compose
              name: temporal-django-worker-data
      volumes:
        - name: temporal-django-worker-data
          persistentVolumeClaim:
            claimName: temporal-django-worker-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: temporal-django-worker-data
  labels:
    app: temporal-django-worker # Label for the PVC, useful for management
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi