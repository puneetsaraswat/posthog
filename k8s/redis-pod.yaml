apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: redis
  name: redis
spec:
  containers:
    - args:
        - redis-server
        - --maxmemory-policy
        - allkeys-lru
        - --maxmemory
        - 200mb
      image: redis:6.2.7-alpine
      livenessProbe:
        exec:
          command:
            - redis-cli
            - ping
        failureThreshold: 10
        periodSeconds: 3
        timeoutSeconds: 10
      name: redis
      volumeMounts:
        - mountPath: /data
          name: redis-data
  restartPolicy: OnFailure
  volumes:
    - name: redis-data
      persistentVolumeClaim:
        claimName: redis-data
