apiVersion: v1
kind: Pod
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: objectstorage
  name: objectstorage
spec:
  containers:
    - args:
        - -c
        - mkdir -p /data/posthog && minio server --address ":19000" --console-address ":19001" /data
      command:
        - sh
      env:
        - name: MINIO_ROOT_PASSWORD
          value: object_storage_root_password
        - name: MINIO_ROOT_USER
          value: object_storage_root_user
      image: minio/minio:RELEASE.2025-02-18T16-25-55Z
      name: objectstorage
      ports:
        - containerPort: 19000
          protocol: TCP
        - containerPort: 19001
          protocol: TCP
      volumeMounts:
        - mountPath: /data
          name: objectstorage
  restartPolicy: OnFailure
  volumes:
    - name: objectstorage
      persistentVolumeClaim:
        claimName: objectstorage
