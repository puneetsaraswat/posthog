
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-dynamic-config # This name is referenced in the Deployment
data:
  development-sql.yaml: |
    limit.maxIDLength:
        - value: 255
          constraints: {}
    system.forceSearchAttributesCacheRefreshOnRead:
        - value: true # Dev setup only. Please don't turn this on in production.
          constraints: {}
---

# --- Temporal Deployment ---
apiVersion: apps/v1 # Changed API version for Deployment
kind: Deployment # Changed kind to Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose -f docker-compose.hobby.yml convert
    kompose.version: 1.34.0 (cbf2835db)
    # kompose.volume.type: configMap # This annotation is not directly used by Kubernetes
  labels:
    io.kompose.service: temporal
  name: temporal # Name of the Deployment
spec:
  replicas: 1 # Number of Temporal server pods
  selector: # How the Deployment finds its pods
    matchLabels:
      app: temporal # A common label to identify the application
  template: # This is the Pod template definition
    metadata:
      labels:
        app: temporal # Must match spec.selector.matchLabels
        io.kompose.service: temporal
    spec:
      containers:
        - env:
            # Environment variables for database connection
            - name: DB
              value: postgresql
            - name: DB_PORT
              value: "5432"
            # Path for dynamic config (inside the container)
            - name: DYNAMIC_CONFIG_FILE_PATH
              value: config/dynamicconfig/development-sql.yaml
            # Elasticsearch related (ensure ES is accessible if enabled)
            - name: ENABLE_ES
              value: "false"
            - name: ES_SEEDS
              value: elasticsearch
            - name: ES_VERSION
              value: v7
            # PostgreSQL credentials (should match your 'db' service)
            - name: POSTGRES_PWD
              value: posthog
            - name: POSTGRES_SEEDS
              value: db # Kubernetes Service name for PostgreSQL
            - name: POSTGRES_USER
              value: posthog
          image: temporalio/auto-setup:1.20.0 # Uses the auto-setup image
          name: temporal
          ports:
            - containerPort: 7233
              protocol: TCP
          volumeMounts:
            # This volume mount corresponds to the ConfigMap
            - mountPath: /etc/temporal/config/dynamicconfig
              name: temporal-dynamic-config-volume # <-- Reference to the new volume name
      volumes:
        # --- CHANGED: Use ConfigMap instead of PersistentVolumeClaim for dynamic config ---
        - name: temporal-dynamic-config-volume # <-- New volume name
          configMap:
            name: temporal-dynamic-config # <-- Name of the ConfigMap created above
            # Items (optional): You can specify specific files from the ConfigMap
            # items:
            #   - key: development-sql.yaml
            #     path: development-sql.yaml
---

# --- Temporal Service ---
apiVersion: v1
kind: Service
metadata:
  name: temporal # Name of the Service, used for DNS resolution within the cluster
  labels:
    app: temporal # Label for the Service itself
spec:
  selector:
    app: temporal # Selects Pods with the label app: temporal
  ports:
    - protocol: TCP
      port: 7233 # Default Temporal gRPC port
      targetPort: 7233 # Port on the Temporal container
      name: grpc # A descriptive name for the port
  type: ClusterIP # Exposes the service internally within the cluster