apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-defs-rs
  labels:
    app: property-defs-rs # Essential label for Deployment management
spec:
  replicas: 1
  selector:
    matchLabels:
      app: property-defs-rs # Matches the label on the Pod template
  template:
    metadata:
      labels:
        app: property-defs-rs # Essential label for Deployment management
    spec:
      containers:
        - name: property-defs-rs # Container name first
          image: ghcr.io/posthog/posthog/property-defs-rs:master
          env:
            - name: DATABASE_URL
              value: postgres://posthog:posthog@db:5432/posthog
            - name: FILTER_MODE
              value: opt-out
            - name: KAFKA_HOSTS
              value: kafka:9092
            - name: SKIP_READS
              value: "false"
            - name: SKIP_WRITES
              value: "false"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 500m
              memory: 1Gi
      # No volumes defined in your original spec, so none are included here.